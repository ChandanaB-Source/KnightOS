version: "3.9"
services:
  backend:
    build: ./backend
    ports: ["5000:5000"]
    environment:
      NODE_ENV: production
      PORT: 5000
    env_file: ./backend/.env
    restart: unless-stopped
    networks: [app]

  frontend:
    build: ./frontend
    networks: [app]
    depends_on: [backend]

  nginx:
    image: nginx:alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [backend, frontend]
    networks: [app]
    restart: unless-stopped

networks:
  app:
    driver: bridge
